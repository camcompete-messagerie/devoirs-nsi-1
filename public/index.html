<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Et paf !</title>
  <link rel="stylesheet" href="style.css">
  <!-- ©THEvenger !-->
</head>
<body>
  <h1>Devoirs de NSI</h1>
  <div id="files-container">
    <button id="premiere" class="title" onclick="loadFilesPremiere()"><h3>Première</h3></button>
    <button id="term" class="title" onclick="loadFilesTerm()"><h3>Terminale</h3></button>
  </div>
  <div id="barre">
  </div>
  <b>coded with ❤️ by Timothée PIOTRE / THEvenger</b></footer>
  <div id="ip"></div>
  
<script>
  fetch('/my-ip')
    .then(r => r.json())
    .then(data => document.getElementById('ip').innerText = data.ip)
    .catch(e => document.getElementById('ip').innerText = 'Erreur : ' + e.message);
</script>
  <script>
    let reveal = false;

    async function loadFilesPremiere() {
      document.getElementById("term").style.display = "none";
      document.getElementById("premiere").style.display = "none";
      const div = document.createElement("div");
      div.innerHTML = `<input checked="" id="option1" name="options" type="radio">
                        <label class="option" for="option1">Première</label>
                        <input id="option2" name="options" type="radio"/>
                        <label class="option" for="option2">Terminale</label>
                        <span class="background"></span>`;
      div.classList.add("filter-switch");
      div.id = "firstFilter";
      document.getElementById("barre").appendChild(div);
      reveal = true;
      const res = await fetch("/api/premiere");
      const files = await res.json();

      const container = document.getElementById("files-container");

      files.forEach(file => {
        const div = document.createElement("div");
        div.className = "file-cardP";

        // Nom du fichier
        const title = document.createElement("h3");
        title.textContent = file.name;
        
        const downloadBtn = document.createElement("a");
        downloadBtn.textContent = "⬇️ Télécharger";
        downloadBtn.onclick = function() {window.location.href = file.url};
        downloadBtn.download = "";
        downloadBtn.className = "btn download";

        div.appendChild(title);
        div.appendChild(downloadBtn);
        container.appendChild(div);
      });
    }

    async function loadFilesTerm() {
      document.getElementById("term").style.display = "none";
      document.getElementById("premiere").style.display = "none";
      const div = document.createElement("div");
      div.innerHTML = `<input checked="" id="option1" name="options" type="radio">
                        <label class="option" for="option1">Première</label>
                        <input id="option2" name="options" type="radio"/>
                        <label class="option" for="option2">Terminale</label>
                        <span class="background"></span>`;
      div.classList.add("filter-switch");
      div.id = "firstFilter";
      document.getElementById("barre").appendChild(div);
      reveal = true;
      const res = await fetch("/api/Term");
      const files = await res.json();

      const container = document.getElementById("files-container");

      files.forEach(file => {
        const div = document.createElement("div");
        div.className = "file-cardT";

        // Nom du fichier
        const title = document.createElement("h3");
        title.textContent = file.name;
        
        const downloadBtn = document.createElement("a");
        downloadBtn.textContent = "⬇️ Télécharger";
        downloadBtn.onclick = function() {window.location.href = file.url};
        downloadBtn.download = "";
        downloadBtn.className = "btn download";

        div.appendChild(title);
        div.appendChild(downloadBtn);
        container.appendChild(div);
      });
    }

    document.getElementById("firstFilter").addEventListener("click", () => {
      if (document.getElementById("option1").checked) {
        try {
          document.querySelectorAll(".file-cardT").classList.add("hidden");
          document.querySelectorAll(".file-cardP").classList.remove("hidden");
        } catch {
          try {
            document.querySelectorAll(".file-cardP").classList.remove("hidden");
          } catch {
            document.querySelectorAll(".file-cardT").classList.add("hidden");
            loadFilesPremiere();
          }
        }
      } else if (document.getElementById("option2").checked) {
        try {
          document.querySelectorAll(".file-cardP").classList.add("hidden");
          document.querySelectorAll(".file-cardT").classList.remove("hidden");
        } catch {
          try {
            document.querySelectorAll(".file-cardT").classList.remove("hidden");
          } catch {
            document.querySelectorAll(".file-cardP").classList.add("hidden");
            loadFilesPremiere();
          }
        }
      }
    })
  </script>
</body>
</html>
